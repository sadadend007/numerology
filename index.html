<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수비학 계산기</title>
  <meta name="description" content="한글 이름과 생년월일로 인생수, 운명수, 혼의수, 성격수, 완성수, 생일수, 연도수, 해운수를 계산하는 정적 웹페이지입니다.">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-layout">
        <div>
          <p class="eyebrow">Numerology</p>
          <h1>수비학 계산기</h1>
          <p class="hero-copy">
            한글 이름과 생년월일을 입력하면 주요 수비학 숫자를 바로 계산합니다.
          </p>
        </div>
        <div class="hero-visual">
          <img src="./assets/app-icon.svg" alt="수비학 계산기 앱 아이콘">
        </div>
      </div>
    </section>

    <section class="panel">
      <form id="numerology-form" class="form" novalidate>
        <label class="field">
          <span>이름 (한글)</span>
          <input id="userName" name="userName" type="text" placeholder="예: 홍길동" autocomplete="name" maxlength="6">
        </label>

        <label class="field">
          <span>생년월일 (8자리)</span>
          <input id="birthDate" name="birthDate" type="text" inputmode="numeric" placeholder="예: 19900101" maxlength="8">
        </label>

        <label class="field">
          <span>해운수 연도 (선택)</span>
          <input id="targetYear" name="targetYear" type="text" inputmode="numeric" placeholder="예: 2026" maxlength="4">
        </label>

        <button class="primary-button" type="submit">계산하기</button>
        <p id="errorMessage" class="error-message" aria-live="polite"></p>
      </form>
    </section>

    <section id="resultSection" class="panel results hidden" aria-live="polite">
      <div class="results-header">
        <h2>계산 결과</h2>
        <p>SwiftUI 앱과 동일한 규칙으로 계산됩니다.</p>
      </div>
      <div id="resultGrid" class="result-grid"></div>
    </section>
  </main>

  <template id="resultRowTemplate">
    <article class="result-card">
      <div>
        <h3 class="result-title"></h3>
        <p class="result-description"></p>
      </div>
      <strong class="result-value"></strong>
    </article>
  </template>

  <script src="./script.js"></script>
</body>
</html>
